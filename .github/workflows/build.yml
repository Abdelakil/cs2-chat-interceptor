name: Build ChatCommandInterceptor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Clone SwiftlyS2
      run: |
        git clone --depth 1 --branch 1.2.2 https://github.com/swiftly-solution/swiftlys2.git
        ls -la swiftlys2/

    - name: Restore dependencies
      run: |
        dotnet restore ChatCommandInterceptor.csproj --configfile NuGet.Config

    - name: Build SwiftlyS2
      run: |
        cd swiftlys2/managed
        dotnet build --configuration Release

    - name: Build plugin
      run: |
        dotnet build ChatCommandInterceptor.csproj --configuration Release --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ChatCommandInterceptor
        path: |
          build/net10.0/
          !build/net10.0/**/*.pdb
        retention-days: 30

    - name: Create release package
      if: github.event_name == 'release'
      run: |
        mkdir -p release
        cp -r build/net10.0/* release/
        rm -f release/*.pdb
        cd release
        zip -r ../ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip .

    - name: Upload release asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip
        asset_name: ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip
