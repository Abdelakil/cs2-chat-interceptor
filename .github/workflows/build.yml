name: Build ChatCommandInterceptor

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build plugin
      run: dotnet build --configuration Release --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ChatCommandInterceptor
        path: |
          build/net10.0/
          !build/net10.0/**/*.pdb
        retention-days: 30

    - name: Create release package
      if: github.event_name == 'release'
      run: |
        mkdir -p release
        cp -r build/net10.0/* release/
        rm -f release/*.pdb
        cd release
        zip -r ../ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip .

    - name: Upload release asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip
        asset_name: ChatCommandInterceptor-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip
